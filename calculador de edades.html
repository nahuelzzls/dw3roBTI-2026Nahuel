<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Edades</title>
<script src="main1.js"></script>
</head>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            background-color: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            text-align: center;
        }
        input[type="date"] {
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 6px;
        }
        button {
            padding: 10px 20px;
            background-color: #007BFF;
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        button:hover {
            background-color: #6800b3;
        }
        .resultado {
            margin-top: 20px;
            font-size: 1.2em;
            color: #333333;
        }
    </style>
<body>
     <div class="container">
        <h1>Calculadora de Edades</h1>
        <label for="fecha">Enter your birth date:</label>
        <input type="date" id="fechaNacimiento" placeholder="Selecciona  tu fecha de nacimiento">
        <br>
        <button onclick="calcularEdad()">Calcular Edad</button>
        <p id="resultado"></p>
     </div>
</body>
</html>
