<html lang="en">

<body>
  <header class="bg-black bg-opacity-50 h-16">

  <section class="grid grid-cols-6">
   
    <aside class="col-start-1 col-span-1 bg-sky-500 p-5">

    <main class="col-start-2 col-span-6 p-5">

  <script>
    const obtenerUsuarios = document.getElementById('btn-API');
    const grid = document.getElementById('grid-usuarios');
    const aviso = document.getElementById('loader');
    const obtenerPublicaciones = document.getElementById('btn-ver-publicaciones');

    // Creamos la conexion a la API mediante una funcion asincrona
    async function conectarUsuarios() {
      try{
        // mostramos el aviso de conexion a la API
        aviso.classList.remove('hidden');
        grid.innerHTML = '';

        // Utilizamos AJAX para conectarnos y esperar la respuesta de la API
        const respuesta = await fetch('https://jsonplaceholder.typicode.com/users')

        if (!respuesta.ok) throw new Error('Error en la carga de usuarios');

        const usuarios = await respuesta.json();

        // ocultamos el aviso de carga
        aviso.classList.add('hidden');

        // Recorremos el resultado con un ciclo for
        for(let i = 0; i < usuarios.length; i++){
          const usuario = usuarios[i];

          // creamos una tarjeta para el usuario
          const tarjeta = document.createElement('div');

          // dejamos espacio para los estilos de tailwind
          tarjeta.className = "bg-white p-6 rounded-xl shadow-md border-t-4 border-blue-500 hover:shadow-lg transition"

          // estructura interna de la tarjeta
          tarjeta.innerHTML = `
            <h2 class="text-xl font-bold text-gray-800">${usuario.name}</h2>
            <p class="text-blue-600 text-sm font-medium mb-4">${usuario.username}</p>
            <div class="text-gray-600 text-sm space-y-2">
              <p><b>✉️Email:</b> ${usuario.email}</p>
              <p><b>🏢Empresa:</b> ${usuario.company.name}</p>
              <p><b>🏙️Ciudad:</b> ${usuario.address.city}</p>
            </div>
            <button id="btn-ver-publicaciones" class="mt-4 w-full bg-gray-100 houver:bg-gray-200  text-gray-700 py-2 rounded-md text-sm font-semibold">
                Ver  publicaciones
                </button>
          `;

          grid.appendChild(tarjeta);
        }
      } catch(error){
        aviso.innerHTML = `<p class="text-red-500">Error: ${error.message} </p>`;
        console.error(error);
      }    
    }

    // Ejecutamos la funcion
    obtenerUsuarios.addEventListener('click', conectarUsuarios);
    //Ejecutamos la fiuncion para obtener las publicaciones
 
  <script>
    // Para mostrar la ventana
    const btnCargar = document.getElementById('btn-cargar');
    const btnCerrar = document.getElementById('btn-cerrar-tarjeta');

    function cargar(){
      document.getElementById('id-tarjeta').classList.remove('hidden');
    }

    btnCargar.onclick = () => cargar();

    // Para cerrar la ventana
    function cerrarVentana(){
      document.getElementById('id-tarjeta').classList.add('hidden');
    }
    btnCerrar.onclick = () => cerrarVentana();
  </script>

</body>
</html>
